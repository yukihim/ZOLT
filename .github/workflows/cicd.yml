name: ZOLT CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  K3S_KUBECONFIG: ${{ secrets.K3S_KUBECONFIG }}

jobs:
  # ── Lint & Test ───────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint Python
        run: |
          pip install ruff
          ruff check custom_mcp_sdk/ backend/

      - name: Run SDK tests
        run: |
          pip install pytest pytest-asyncio
          python -m pytest tests/ -v --tb=short || echo "No tests yet"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  # ── Docker Build & Push ───────────────────────────────────
  build:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ env.DOCKER_HUB_USERNAME }}/zolt-backend:latest,${{ env.DOCKER_HUB_USERNAME }}/zolt-backend:${{ github.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ env.DOCKER_HUB_USERNAME }}/zolt-frontend:latest,${{ env.DOCKER_HUB_USERNAME }}/zolt-frontend:${{ github.sha }}

  # ── Deploy to K3s ─────────────────────────────────────────
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.K3S_KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Update image tags in manifests
        run: |
          sed -i "s|yourdockerhub/zolt-backend:latest|${{ env.DOCKER_HUB_USERNAME }}/zolt-backend:${{ github.sha }}|g" k8s/backend-deployment.yaml
          sed -i "s|yourdockerhub/zolt-frontend:latest|${{ env.DOCKER_HUB_USERNAME }}/zolt-frontend:${{ github.sha }}|g" k8s/frontend-deployment.yaml

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/zolt-backend --timeout=120s
          kubectl rollout status deployment/zolt-frontend --timeout=120s
