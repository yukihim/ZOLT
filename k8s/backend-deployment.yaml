apiVersion: apps/v1
kind: Deployment
metadata:
  name: zolt-backend
  labels:
    app: zolt-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zolt-backend
  template:
    metadata:
      labels:
        app: zolt-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          image: yourdockerhub/zolt-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: zolt-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: zolt-backend
spec:
  selector:
    app: zolt-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
