apiVersion: apps/v1
kind: Deployment
metadata:
  name: zolt-frontend
  labels:
    app: zolt-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zolt-frontend
  template:
    metadata:
      labels:
        app: zolt-frontend
    spec:
      containers:
        - name: frontend
          image: yourdockerhub/zolt-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: zolt-frontend
spec:
  selector:
    app: zolt-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
