apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zolt-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: zolt.yourdomain.com  # Replace with your domain
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: zolt-backend
                port:
                  number: 8000
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: zolt-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zolt-frontend
                port:
                  number: 80
